<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Portfolio & Watchlist Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-neutral: #141417;
            --bg-card: #1e1e22;
            --text-main: #f0f0f3;
            --text-sub: #9ea4ae;
            --border-subtle: #2d2d33;
            
            --color-up: #ff5e67;
            --color-down: #4da6ff;
            --color-accent: #6c5ce7;
        }

        body {
            background-color: var(--bg-neutral);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
        }

        h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main); }
        .header-sub { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        h3 { font-size: 15px; font-weight: 600; color: var(--text-main); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        .val-up { color: var(--color-up); }
        .val-down { color: var(--color-down); }

        .asset-overview {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-balance { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .sub-balance-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }
        .balance-item { display: flex; flex-direction: column; gap: 2px; }
        .balance-label { font-size: 12px; color: var(--text-sub); }
        .balance-value { font-size: 15px; font-weight: 600; }

        textarea {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-main);
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-size: 13px;
        }
        textarea:focus { outline: none; border-color: var(--color-accent); }

        .btn-apply {
            width: 100%;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .chart-container {
            position: relative;
            height: 190px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            color: var(--text-sub);
            font-weight: 500;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: middle;
        }

        .price-cell { text-align: right; }
        .profit-cell { text-align: right; font-weight: 600; }

        .opinion-input {
            width: 100%;
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 13px;
            box-sizing: border-box;
        }

        /* 🛒 매수 / 매도 버튼 스타일 */
        .trade-btn-group {
            display: flex;
            gap: 4px;
            justify-content: flex-end;
        }
        .btn-trade {
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        .btn-trade:hover { opacity: 1; }
        .btn-buy { background-color: rgba(255, 94, 103, 0.15); color: var(--color-up); border: 1px solid rgba(255, 94, 103, 0.3); }
        .btn-sell { background-color: rgba(77, 166, 255, 0.15); color: var(--color-down); border: 1px solid rgba(77, 166, 255, 0.3); }

        .stock-info-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stock-holding-amount {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: normal;
        }

        /* 📝 따라다니는 이동식 플로팅 일지 창 스타일 */
        .floating-diary-trigger {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .floating-diary-window {
            position: fixed;
            bottom: 85px;
            right: 24px;
            width: 320px;
            background-color: #222226;
            border: 1px solid #3c3c43;
            border-radius: 16px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }

        .diary-window-header {
            background-color: #1a1a1e;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move; /* 드래그 가능 아이콘 */
            user-select: none;
            border-bottom: 1px solid var(--border-subtle);
        }

        .diary-window-close {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 16px;
            cursor: pointer;
        }
        .diary-window-close:hover { color: white; }

        .diary-window-body {
            padding: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>나의 자산 및 주식 관점 일지</h1>
        <div class="header-sub">실시간 시장 지수와 관심 종목 가격 변동을 함께 모니터링합니다.</div>
    </header>

    <div class="card" style="border-color: var(--color-accent);">
        <h3>📥 <span>Gem 추출 데이터 복붙함</span></h3>
        <textarea id="json-paste-box" style="height: 100px; font-family: monospace;" placeholder="Gem이 준 지수 및 관심 종목 포함 데이터를 여기에 붙여넣으세요."></textarea>
        <button class="btn-apply" onclick="applyGemData()">데이터 즉시 적용 및 변환하기</button>
    </div>

    <div class="card" style="padding: 16px;">
        <h3>🌟 <span style="margin-left: 2px;">주요 지수 및 관심 종목 현황</span></h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">자산명</th>
                    <th style="width: 25%; text-align: right;">현재 시점가</th>
                    <th style="width: 25%; text-align: right;">전날 대비</th>
                    <th style="width: 20%; text-align: right;">판단</th>
                </tr>
            </thead>
            <tbody id="watchlist-list">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h3>📈 <span style="margin-left: 2px;">현재 자산 현황 Overview</span></h3>
        <div class="asset-overview">
            <div class="main-balance" id="txt-total-asset">0원</div>
            <div class="sub-balance-group">
                <div class="balance-item">
                    <span class="balance-label">원금</span>
                    <span class="balance-value" id="txt-principal">0원</span>
                </div>
                <div class="balance-item">
                    <span class="balance-label">총 수익 (수익률)</span>
                    <span class="balance-value" id="txt-total-profit-rate">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📊 <span>총자산 추이 비교</span></h3>
        <div class="chart-container">
            <canvas id="assetHistoryChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>⚖️ <span>보유 종목 수익률 비교</span></h3>
        <div class="chart-container">
            <canvas id="stockProfitChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 60px; padding: 16px;">
        <h3>🔍 <span>보유 종목 현황 및 매매 의견</span></h3>
        <table id="stock-table">
            <thead>
                <tr>
                    <th style="width: 42%;">종목명 (보유액)</th>
                    <th style="width: 20%; text-align: right;">현재가</th>
                    <th style="width: 18%; text-align: right;">수익률</th>
                    <th style="width: 20%;">매매 의견</th>
                </tr>
            </thead>
            <tbody id="stock-list">
                </tbody>
        </table>
    </div>
</div>

<button class="floating-diary-trigger" onclick="toggleDiaryWindow()">
    <span>📝</span> 일지 기록장
</button>

<div class="floating-diary-window" id="draggable-diary">
    <div class="diary-window-header" id="draggable-diary-header">
        <span>📌 관점 기록 창 (드래그하여 이동 가능)</span>
        <button class="diary-window-close" onclick="toggleDiaryWindow()">×</button>
    </div>
    <div class="diary-window-body">
        <textarea id="market-view" style="height: 180px; background-color: #141417;" placeholder="웹사이트 화면을 보면서 오늘 시장에 대한 생각을 자유롭게 기록하세요..."></textarea>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('portfolio_db')) || [];
    let assetChartInstance = null;
    let stockChartInstance = null;

    Chart.defaults.font.family = "'Pretendard', sans-serif";
    Chart.defaults.color = "#9ea4ae";

    window.onload = function() {
        if(db.length === 0) {
            // 초기 기본 데이터 세팅
            db = [
                {
                    "date": "2026-05-17",
                    "total_asset": 22500000,
                    "principal": 15429928,
                    "total_profit": 7070072,
                    "total_profit_rate": 45.8,
                    "market_watchlist": { "코스피": 2630.10, "나스닥": 16210.50, "구글": 173.10, "엔비디아": 912.00, "시에나": 47.10, "삼성전자": 77200, "현대차": 241000, "SK하이닉스": 179500 },
                    "stocks": []
                },
                {
                    "date": "2026-05-18",
                    "total_asset": 23166050,
                    "principal": 15429928,
                    "total_profit": 7736122,
                    "total_profit_rate": 50.1,
                    "market_watchlist": { "코스피": 2650.50, "나스닥": 16350.20, "구글": 175.40, "엔비디아": 920.30, "시에나": 48.50, "삼성전자": 78500, "현대차": 245000, "SK하이닉스": 182000 },
                    "stocks": [
                        { "name": "시에나", "count": 10, "current_price": 835973, "profit_rate": 125.3 },
                        { "name": "INTW", "count": 15, "current_price": 413794, "profit_rate": 481.1 },
                        { "name": "METU", "count": 87, "current_price": 36970, "profit_rate": -26.3 },
                        { "name": "NVDL", "count": 10, "current_price": 180290, "profit_rate": 21.2 },
                        { "name": "PLTU", "count": 30, "current_price": 51998, "profit_rate": -44.8 },
                        { "name": "AMDL", "count": 20, "current_price": 73100, "profit_rate": 112.7 },
                        { "name": "TSLL", "count": 40, "current_price": 22242, "profit_rate": -30.5 },
                        { "name": "애플", "count": 0.004171, "current_price": 447630, "profit_rate": 39.7 }
                    ]
                }
            ];
            localStorage.setItem('portfolio_db', JSON.stringify(db));
        }
        updateDashboard();
        initDraggable();
    };

    function toggleDiaryWindow() {
        const win = document.getElementById('draggable-diary');
        win.style.display = (win.style.display === 'block') ? 'none' : 'block';
    }

    function applyGemData() {
        const rawText = document.getElementById('json-paste-box').value.trim();
        if(!rawText) return;

        try {
            const newData = JSON.parse(rawText);
            if(!newData.date) return;

            if(!newData.total_asset && db.length > 0) {
                newData.total_asset = db[db.length - 1].total_asset;
                newData.principal = db[db.length - 1].principal;
                newData.total_profit = db[db.length - 1].total_profit;
                newData.total_profit_rate = db[db.length - 1].total_profit_rate;
            }
            if(!newData.stocks) newData.stocks = db[db.length - 1].stocks || [];

            if (newData.market_watchlist && Array.isArray(newData.market_watchlist)) {
                const convertedList = {};
                newData.market_watchlist.forEach(item => {
                    if(item.name && item.price) convertedList[item.name] = item.price;
                });
                newData.market_watchlist = convertedList;
            }

            const existingIndex = db.findIndex(item => item.date === newData.date);
            if (existingIndex !== -1) db[existingIndex] = newData;
            else db.push(newData);

            db.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('portfolio_db', JSON.stringify(db));
            
            document.getElementById('json-paste-box').value = "";
            updateDashboard();
            alert(`${newData.date} 데이터 처리 완료!`);
        } catch(e) {
            alert("JSON 구문오류가 발견되었습니다.");
        }
    }

    function updateDashboard() {
        const todayData = db[db.length - 1];
        const prevData = db.length > 1 ? db[db.length - 2] : null;

        // 1. 관심종목 현황판 렌더링 (+ 매수/매도 버튼 조립)
        const watchlistContainer = document.getElementById('watchlist-list');
        watchlistContainer.innerHTML = "";
        
        if (todayData.market_watchlist) {
            Object.keys(todayData.market_watchlist).forEach(key => {
                const tr = document.createElement('tr');
                const currentPrice = todayData.market_watchlist[key];
                
                let changeText = "0.0%";
                let changeClass = "";
                
                if (prevData && prevData.market_watchlist && prevData.market_watchlist[key]) {
                    const prevPrice = prevData.market_watchlist[key];
                    const changeRate = ((currentPrice - prevPrice) / prevPrice) * 100;
                    const arrow = changeRate >= 0 ? "▲" : "▼";
                    changeText = `${arrow} ${Math.abs(changeRate).toFixed(1)}%`;
                    changeClass = changeRate >= 0 ? "val-up" : "val-down";
                }

                const isIndex = key === "코스피" || key === "나스닥";
                const formattedPrice = isIndex ? currentPrice.toLocaleString() : currentPrice.toLocaleString() + (key === "구글" || key === "엔비디아" || key === "시에나" ? " $" : " 원");

                // 지수 상품군에는 거래버튼 숨김, 개별종목에만 활성화 기본화
                const buttonHTML = isIndex ? '' : `
                    <div class="trade-btn-group">
                        <button class="btn-trade btn-buy" onclick="alert('${key} 매수 아이디어를 기록합니다.')">매수</button>
                        <button class="btn-trade btn-sell" onclick="alert('${key} 매도 아이디어를 기록합니다.')">매도</button>
                    </div>
                `;

                tr.innerHTML = `
                    <td><strong>${key}</strong></td>
                    <td class="price-cell">${formattedPrice}</td>
                    <td class="profit-cell ${changeClass}">${changeText}</td>
                    <td>${buttonHTML}</td>
                `;
                watchlistContainer.appendChild(tr);
            });
        }

        // 2. 상단 총액 연동
        document.getElementById('txt-total-asset').innerText = todayData.total_asset.toLocaleString() + "원";
        document.getElementById('txt-principal').innerText = todayData.principal.toLocaleString() + "원";
        const profitRateEl = document.getElementById('txt-total-profit-rate');
        profitRateEl.innerText = `${todayData.total_profit_rate >= 0 ? "+" : ""}${todayData.total_profit_rate}%`;
        profitRateEl.className = `balance-value ${todayData.total_profit_rate >= 0 ? 'val-up' : 'val-down'}`;

        // 3. 플로팅 노트 데이터 동기화
        const viewArea = document.getElementById('market-view');
        const viewKey = `market_view_${todayData.date}`;
        viewArea.value = localStorage.getItem(viewKey) || "";
        viewArea.oninput = function(e) { localStorage.setItem(viewKey, e.target.value); };

        // 4. 보유 자산 리스트 연동 (+ 평가 금액 연산 추가)
        const stockListContainer = document.getElementById('stock-list');
        stockListContainer.innerHTML = "";
        todayData.stocks.forEach((stock) => {
            const tr = document.createElement('tr');
            const rateClass = stock.profit_rate >= 0 ? 'val-up' : 'val-down';
            const formattedCount = Number.isInteger(stock.count) ? `${stock.count}주` : `${stock.count.toFixed(4)}주`;
            
            // 수량 * 현재가를 통한 실시간 종목별 보유 금액 계산
            const holdingAmount = Math.round(stock.count * stock.current_price);
            const opinionKey = `opinion_${stock.name}_${todayData.date}`;

            tr.innerHTML = `
                <td>
                    <div class="stock-info-block">
                        <div><strong>${stock.name}</strong> <span style="font-size:12px; color:var(--text-sub);">(${formattedCount})</span></div>
                        <div class="stock-holding-amount">보유액: ${holdingAmount.toLocaleString()}원</div>
                    </div>
                </td>
                <td class="price-cell">${stock.current_price.toLocaleString()}원</td>
                <td class="profit-cell ${rateClass}">${stock.profit_rate >= 0 ? "+" : ""}${stock.profit_rate}%</td>
                <td>
                    <input type="text" class="opinion-input" value="${localStorage.getItem(opinionKey) || ""}" onchange="localStorage.setItem('${opinionKey}', this.value)">
                </td>
            `;
            stockListContainer.appendChild(tr);
        });

        // 5. 시계열 자산 선 그래프 (Line Chart)
        const ctxHistory = document.getElementById('assetHistoryChart').getContext('2d');
        if(assetChartInstance) assetChartInstance.destroy();
        assetChartInstance = new Chart(ctxHistory, {
            type: 'line',
            data: {
                labels: db.map(d => d.date.split('-').slice(1).join('.')),
                datasets: [{
                    data: db.map(d => d.total_asset),
                    borderColor: '#6c5ce7',
                    backgroundColor: 'rgba(108, 92, 231, 0.08)',
                    borderWidth: 2.5,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: { maintainAspectRatio: false, plugins: { datalabels: { display: false }, legend: { display: false } } }
        });

        // 6. 보유 자산 막대 그래프 (Bar Chart)
        const ctxProfit = document.getElementById('stockProfitChart').getContext('2d');
        if(stockChartInstance) stockChartInstance.destroy();
        stockChartInstance = new Chart(ctxProfit, {
            type: 'bar',
            plugins: [ChartDataLabels],
            data: {
                labels: todayData.stocks.map(s => s.name),
                datasets: [{
                    data: todayData.stocks.map(s => s.profit_rate),
                    backgroundColor: todayData.stocks.map(s => s.profit_rate >= 0 ? '#ff5e67' : '#4da6ff'),
                    borderRadius: 4
                }]
            },
            options: {
                maintainAspectRatio: false,
                layout: { padding: { top: 24 } },
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        display: true, align: 'end', anchor: 'end', color: '#f0f0f3', font: { size: 10, weight: '600' },
                        formatter: function(value) { return (value > 0 ? '+' : '') + value.toFixed(1) + '%'; }
                    }
                }
            }
        });
    }

    // 📌 미니 창 드래그 이동 자바스크립트 엔진 (마우스 & 터치 인터페이스 완벽 지원)
    function initDraggable() {
        const el = document.getElementById("draggable-diary");
        const header = document.getElementById("draggable-diary-header");
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

        header.onmousedown = dragMouseDown;
        header.ontouchstart = dragMouseDown;

        function dragMouseDown(e) {
            e = e || window.event;
            // 터치 이벤트 대응 포함
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            pos3 = clientX;
            pos4 = clientY;
            
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
            document.ontouchend = closeDragElement;
            document.ontouchmove = elementDrag;
        }

        function elementDrag(e) {
            e = e || window.event;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            pos1 = pos3 - clientX;
            pos2 = pos4 - clientY;
            pos3 = clientX;
            pos4 = clientY;

            // 창 위치 리포지셔닝
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
            el.style.bottom = "auto";
            el.style.right = "auto";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
            document.ontouchend = null;
            document.ontouchmove = null;
        }
    }
</script>
</body>
</html>
