<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Portfolio & Watchlist Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-neutral: #141417;
            --bg-card: #1e1e22;
            --text-main: #f0f0f3;
            --text-sub: #9ea4ae;
            --border-subtle: #2d2d33;
            
            --color-up: #ff5e67;
            --color-down: #4da6ff;
            --color-accent: #6c5ce7;
            --color-tip: #ffb900;
        }

        body {
            background-color: var(--bg-neutral);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main); }
        .header-sub { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        .date-selector-zone {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .select-date {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        h3 { font-size: 15px; font-weight: 600; color: var(--text-main); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        .val-up { color: var(--color-up); }
        .val-down { color: var(--color-down); }
        .diff-text { font-size: 11px; display: block; font-weight: normal; margin-top: 2px; }

        .asset-overview {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-balance { font-size: 28px; font-weight: 800; color: var(--text-main); }
        
        /* 📉 총자산 변동폭 라벨 디자인 */
        .asset-diff-badge {
            font-size: 13px;
            font-weight: 500;
            margin-top: -4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sub-balance-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }
        .balance-item { display: flex; flex-direction: column; gap: 2px; }
        .balance-label { font-size: 12px; color: var(--text-sub); }
        .balance-value { font-size: 15px; font-weight: 600; }

        textarea {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-main);
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-size: 13px;
            line-height: 1.6;
        }
        textarea:focus { outline: none; border-color: var(--color-accent); }

        /* 💡 나만의 주식 팁 컴포넌트 스타일 */
        .tip-textarea {
            height: 70px;
            background-color: #242428;
            border: 1px solid #3c3c43;
            color: #f0f0f3;
            font-family: inherit;
        }
        .tip-textarea:focus { border-color: var(--color-tip); }

        .btn-apply {
            width: 100%;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .chart-container {
            position: relative;
            height: 190px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            color: var(--text-sub);
            font-weight: 500;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: middle;
        }

        .price-cell { text-align: right; }
        .profit-cell { text-align: right; font-weight: 600; }

        .stock-info-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stock-holding-amount {
            font-size: 11px;
            color: var(--text-sub);
        }

        .floating-diary-trigger {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .floating-diary-window {
            position: fixed;
            bottom: 85px;
            right: 24px;
            width: 330px;
            background-color: #1e1e22;
            border: 1px solid #3c3c43;
            border-radius: 16px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }

        .diary-window-header {
            background-color: #141417;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            border-bottom: 1px solid var(--border-subtle);
        }

        .diary-window-close {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 16px;
            cursor: pointer;
        }

        .diary-window-body {
            padding: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>나의 자산 및 주식 관점 일지</h1>
            <div class="header-sub">관심 종목의 최신 실시간 현황과 누적 데이터를 관리합니다.</div>
        </div>
        <div class="date-selector-zone">
            <select class="select-date" id="history-date-select" onchange="changeDisplayDate(this.value)">
                </select>
        </div>
    </header>

    <div class="card" style="border-color: var(--color-tip); padding: 16px;">
        <h3 style="color: var(--color-tip); margin-bottom: 8px;">💡 <span>나만의 주식 매매 팁 & 원칙</span></h3>
        <textarea id="custom-stock-tips" class="tip-textarea" placeholder="여기에 자신만의 매매 팁이나 지켜야 할 원칙을 자유롭게 적어두세요. (자동 저장됩니다)"></textarea>
    </div>

    <div class="card" style="border-color: var(--color-accent);">
        <h3>📥 <span>Gem 추출 데이터 복붙함</span></h3>
        <textarea id="json-paste-box" style="height: 60px; font-family: monospace;" placeholder="Gem이 준 데이터를 여기에 붙여넣으세요."></textarea>
        <button class="btn-apply" onclick="applyGemData()">데이터 즉시 적용 및 변환하기</button>
    </div>

    <div class="card" style="padding: 16px;">
        <h3>🌟 <span style="margin-left: 2px;">주요 지수 및 관심 종목 현황</span></h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">자산명</th>
                    <th style="width: 30%; text-align: right;">현재 시점가</th>
                    <th style="width: 35%; text-align: right;">전날 대비 변동</th>
                </tr>
            </thead>
            <tbody id="watchlist-list">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h3>📈 <span id="lbl-dashboard-date" style="margin-left: 2px;">자산 현황 Overview</span></h3>
        <div class="asset-overview">
            <div class="main-balance" id="txt-total-asset">0원</div>
            <div id="txt-total-asset-diff" class="asset-diff-badge"></div>
            
            <div class="sub-balance-group">
                <div class="balance-item">
                    <span class="balance-label">원금</span>
                    <span class="balance-value" id="txt-principal">0원</span>
                </div>
                <div class="balance-item">
                    <span class="balance-label">총 수익 (수익률)</span>
                    <span class="balance-value" id="txt-total-profit-rate">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📊 <span>총자산 추이 비교</span></h3>
        <div class="chart-container">
            <canvas id="assetHistoryChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>⚖️ <span>보유 종목 수익률 비교</span></h3>
        <div class="chart-container">
            <canvas id="stockProfitChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 40px; padding: 16px;">
        <h3>🔍 <span>보유 종목 현황 및 수익률 추이</span></h3>
        <table id="stock-table">
            <thead>
                <tr>
                    <th style="width: 40%;">종목명 (보유액)</th>
                    <th style="width: 25%; text-align: right;">현재가</th>
                    <th style="width: 35%; text-align: right;">수익률 (전일대비 변동)</th>
                </tr>
            </thead>
            <tbody id="stock-list">
                </tbody>
        </table>
    </div>
</div>

<button class="floating-diary-trigger" onclick="toggleDiaryWindow()">
    <span>📝</span> 일지 작성
</button>

<div class="floating-diary-window" id="draggable-diary">
    <div class="diary-window-header" id="draggable-diary-header">
        <span id="lbl-diary-title">📌 관점 기록장</span>
        <button class="diary-window-close" onclick="toggleDiaryWindow()">×</button>
    </div>
    <div class="diary-window-body">
        <textarea id="market-view" style="height: 250px; background-color: #141417;" placeholder="오늘 시장에 대한 생각과 관점을 자유롭게 기록하세요..."></textarea>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('portfolio_db')) || [];
    let assetChartInstance = null;
    let stockChartInstance = null;
    let selectedDate = ""; 

    const USD_KRW_EXCHANGE_RATE = 1380;

    Chart.defaults.font.family = "'Pretendard', sans-serif";
    Chart.defaults.color = "#9ea4ae";

    const masterBackupSeed = [
        {
            "date": "2026-05-17",
            "total_asset": 22500000,
            "principal": 15429928,
            "total_profit": 7070072,
            "total_profit_rate": 45.8,
            "market_watchlist": { "코스피": 2630.10, "나스닥": 16210.50, "구글": 173.10, "엔비디아": 912.00, "시에나": 47.10, "삼성전자": 77200, "현대차": 241000, "SK하이닉스": 179500 },
            "stocks": [
                { "name": "시에나", "count": 10, "current_price": 781768, "profit_rate": 110.6 },
                { "name": "INTW", "count": 15, "current_price": 399498, "profit_rate": 461.0 },
                { "name": "METU", "count": 87, "current_price": 36968, "profit_rate": -26.3 },
                { "name": "NVDL", "count": 10, "current_price": 169072, "profit_rate": 13.7 },
                { "name": "PLTU", "count": 30, "current_price": 53506, "profit_rate": -43.2 },
                { "name": "AMDL", "count": 20, "current_price": 69457, "profit_rate": 102.1 },
                { "name": "TSLL", "count": 40, "current_price": 20942, "profit_rate": -34.5 },
                { "name": "애플", "count": 0.004171, "current_price": 445758, "profit_rate": 39.1 }
            ]
        },
        {
            "date": "2026-05-18",
            "total_asset": 23499458,
            "principal": 15429928,
            "total_profit": 8069530,
            "total_profit_rate": 52.2,
            "market_watchlist": { "코스피": 2650.50, "나스닥": 16350.20, "구글": 175.40, "엔비디아": 920.30, "시에나": 48.50, "삼성전자": 78500, "현대차": 245000, "SK하이닉스": 182000 },
            "stocks": [
                { "name": "시에나", "count": 10, "current_price": 835973, "profit_rate": 125.3 },
                { "name": "INTW", "count": 15, "current_price": 413794, "profit_rate": 481.1 },
                { "name": "METU", "count": 87, "current_price": 36970, "profit_rate": -26.3 },
                { "name": "NVDL", "count": 10, "current_price": 180290, "profit_rate": 21.2 },
                { "name": "PLTU", "count": 30, "current_price": 51998, "profit_rate": -44.8 },
                { "name": "AMDL", "count": 20, "current_price": 73100, "profit_rate": 112.7 },
                { "name": "TSLL", "count": 40, "current_price": 22242, "profit_rate": -30.5 },
                { "name": "애플", "count": 0.004171, "current_price": 447630, "profit_rate": 39.7 }
            ]
        }
    ];

    window.onload = function() {
        if (db.length < 2 || !db.some(d => d.date === "2026-05-18")) {
            db = masterBackupSeed;
            localStorage.setItem('portfolio_db', JSON.stringify(db));
        }

        selectedDate = db[db.length - 1].date; 
        
        // 💡 주식 팁 컴포넌트 데이터 불러오기 및 실시간 연동
        const tipArea = document.getElementById('custom-stock-tips');
        tipArea.value = localStorage.getItem('my_stock_trading_tips') || "";
        tipArea.oninput = function(e) {
            localStorage.setItem('my_stock_trading_tips', e.target.value);
        };

        initDateSelector();
        updateDashboard();
        initDraggable();
    };

    function initDateSelector() {
        const selector = document.getElementById('history-date-select');
        selector.innerHTML = "";
        db.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.date;
            opt.innerText = item.date === db[db.length-1].date ? `${item.date} (최신)` : item.date;
            selector.appendChild(opt);
        });
        selector.value = selectedDate;
    }

    function changeDisplayDate(dateStr) {
        selectedDate = dateStr;
        updateDashboard();
    }

    function toggleDiaryWindow() {
        const win = document.getElementById('draggable-diary');
        win.style.display = (win.style.display === 'block') ? 'none' : 'block';
    }

    function applyGemData() {
        const rawText = document.getElementById('json-paste-box').value.trim();
        if(!rawText) return;

        try {
            const newData = JSON.parse(rawText);
            if(!newData.date) return;

            if (newData.market_watchlist && Array.isArray(newData.market_watchlist)) {
                const convertedList = {};
                newData.market_watchlist.forEach(item => {
                    if(item.name && item.price) convertedList[item.name] = item.price;
                });
                newData.market_watchlist = convertedList;
            }

            const existingIndex = db.findIndex(item => item.date === newData.date);
            if (existingIndex !== -1) db[existingIndex] = newData;
            else db.push(newData);

            db.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('portfolio_db', JSON.stringify(db));
            
            selectedDate = newData.date; 
            document.getElementById('json-paste-box').value = "";
            
            initDateSelector();
            updateDashboard();
            alert(`${newData.date} 데이터 반영이 완료되었습니다.`);
        } catch(e) {
            alert("JSON 구문오류입니다.");
        }
    }

    function updateDashboard() {
        const targetIdx = db.findIndex(d => d.date === selectedDate);
        const todayData = db[targetIdx];
        const prevData = targetIdx > 0 ? db[targetIdx - 1] : null;

        document.getElementById('lbl-dashboard-date').innerText = `자산 현황 Overview (${selectedDate})`;
        document.getElementById('lbl-diary-title').innerText = `📌 관점 기록장 (${selectedDate})`;

        // 1. 관심 종목 테이블 동적 렌더링 (전일비 % 및 원화 변동액 연산 고도화)
        const watchlistContainer = document.getElementById('watchlist-list');
        watchlistContainer.innerHTML = "";
        
        if (todayData.market_watchlist) {
            Object.keys(todayData.market_watchlist).forEach(key => {
                const tr = document.createElement('tr');
                let currentPrice = todayData.market_watchlist[key];
                
                let changeText = "0.0%";
                let changeClass = "";
                
                const isIndex = key === "코스피" || key === "나스닥";
                const isUsStock = key === "구글" || key === "엔비디아" || key === "시에나";
                
                if (isUsStock && currentPrice < 2000) { 
                    currentPrice = Math.round(currentPrice * USD_KRW_EXCHANGE_RATE);
                }

                if (prevData && prevData.market_watchlist && prevData.market_watchlist[key]) {
                    let prevPrice = prevData.market_watchlist[key];
                    if (isUsStock && prevPrice < 2000) {
                        prevPrice = Math.round(prevPrice * USD_KRW_EXCHANGE_RATE);
                    }
                    const changeRate = ((currentPrice - prevPrice) / prevPrice) * 100;
                    const priceDiff = currentPrice - prevPrice;
                    
                    const sign = priceDiff >= 0 ? "▲" : "▼";
                    const diffValueStr = isIndex ? priceDiff.toFixed(2) : Math.abs(priceDiff).toLocaleString() + "원";
                    
                    changeText = `${sign} ${Math.abs(changeRate).toFixed(1)}% (${diffValueStr})`;
                    changeClass = priceDiff >= 0 ? "val-up" : "val-down";
                }

                const formattedPrice = currentPrice.toLocaleString() + (isIndex ? "" : " 원");

                tr.innerHTML = `<td><strong>${key}</strong></td><td class="price-cell">${formattedPrice}</td><td class="profit-cell ${changeClass}" style="font-size: 12px;">${changeText}</td>`;
                watchlistContainer.appendChild(tr);
            });
        }

        // 2. 오버뷰 총액 및 총자산 전일 대비 변동폭(원화) 계산
        document.getElementById('txt-total-asset').innerText = todayData.total_asset.toLocaleString() + "원";
        
        const assetDiffEl = document.getElementById('txt-total-asset-diff');
        if (prevData) {
            const assetDiffValue = todayData.total_asset - prevData.total_asset;
            const assetDiffSign = assetDiffValue >= 0 ? "▲" : "▼";
            assetDiffEl.innerText = `${assetDiffSign} 전일대비 ${Math.abs(assetDiffValue).toLocaleString()}원 (${(assetDiffValue >= 0 ? '+' : '') + ((assetDiffValue / prevData.total_asset) * 100).toFixed(2)}%)`;
            assetDiffEl.className = `asset-diff-badge ${assetDiffValue >= 0 ? 'val-up' : 'val-down'}`;
        } else {
            assetDiffEl.innerText = "전일 데이터 없음";
            assetDiffEl.className = "asset-diff-badge";
            assetDiffEl.style.color = "var(--text-sub)";
        }

        document.getElementById('txt-principal').innerText = todayData.principal.toLocaleString() + "원";
        const profitRateEl = document.getElementById('txt-total-profit-rate');
        profitRateEl.innerText = `${todayData.total_profit_rate >= 0 ? "+" : ""}${todayData.total_profit_rate}%`;
        profitRateEl.className = `balance-value ${todayData.total_profit_rate >= 0 ? 'val-up' : 'val-down'}`;

        // 3. 플로팅 일지 본문 세팅
        const viewArea = document.getElementById('market-view');
        const viewKey = `market_view_${todayData.date}`;
        if (!localStorage.getItem(viewKey)) {
            let template = `[오늘의 시황 기록: ${todayData.date}]\n\n■ 보유 종목 관점\n`;
            todayData.stocks.forEach(s => { template += `- ${s.name}: \n`; });
            template += `\n■ 관심 종목 관점\n`;
            if(todayData.market_watchlist) Object.keys(todayData.market_watchlist).forEach(k => { template += `- ${k}: \n`; });
            localStorage.setItem(viewKey, template);
        }
        viewArea.value = localStorage.getItem(viewKey);
        viewArea.oninput = function(e) { localStorage.setItem(viewKey, e.target.value); };

        // 4. 보유 자산 상세 렌더링 (수익률 변동 및 전일비 금액 하락폭 추가 연산)
        const stockListContainer = document.getElementById('stock-list');
        stockListContainer.innerHTML = "";
        
        todayData.stocks.forEach((stock) => {
            const tr = document.createElement('tr');
            const rateClass = stock.profit_rate >= 0 ? 'val-up' : 'val-down';
            const formattedCount = Number.isInteger(stock.count) ? `${stock.count}주` : `${stock.count.toFixed(4)}주`;
            const holdingAmount = Math.round(stock.count * stock.current_price);

            let diffHTML = "";
            if (prevData && prevData.stocks) {
                const prevStock = prevData.stocks.find(s => s.name === stock.name);
                if (prevStock) {
                    const rateDiff = stock.profit_rate - prevStock.profit_rate;
                    const priceDiff = stock.current_price - prevStock.current_price;
                    
                    const diffSign = rateDiff >= 0 ? "▲" : "▼";
                    const diffClass = rateDiff >= 0 ? "val-up" : "val-down";
                    
                    diffHTML = `<span class="diff-text ${diffClass}" style="font-size:11px;">${diffSign} 전일비 ${Math.abs(rateDiff).toFixed(1)}% (${priceDiff >= 0 ? '+' : ''}${priceDiff.toLocaleString()}원)</span>`;
                }
            }

            tr.innerHTML = `
                <td>
                    <div class="stock-info-block">
                        <div><strong>${stock.name}</strong> <span style="font-size:11px; color:var(--text-sub);">(${formattedCount})</span></div>
                        <div class="stock-holding-amount">보유액: ${holdingAmount.toLocaleString()}원</div>
                    </div>
                </td>
                <td class="price-cell">${stock.current_price.toLocaleString()}원</td>
                <td class="profit-cell ${rateClass}" style="font-size: 13px;">
                    <span>${stock.profit_rate >= 0 ? "+" : ""}${stock.profit_rate}%</span>
                    ${diffHTML}
                </td>
            `;
            stockListContainer.appendChild(tr);
        });

        // 5. 차트 렌더링 (Line)
        const ctxHistory = document.getElementById('assetHistoryChart').getContext('2d');
        if(assetChartInstance) assetChartInstance.destroy();
        assetChartInstance = new Chart(ctxHistory, {
            type: 'line',
            data: {
                labels: db.map(d => d.date.split('-').slice(1).join('.')),
                datasets: [{
                    data: db.map(d => d.total_asset),
                    borderColor: '#6c5ce7',
                    backgroundColor: 'rgba(108, 92, 231, 0.08)',
                    borderWidth: 2.5,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: { maintainAspectRatio: false, plugins: { datalabels: { display: false }, legend: { display: false } } }
        });

        // 6. 차트 렌더링 (Bar)
        const ctxProfit = document.getElementById('stockProfitChart').getContext('2d');
        if(stockChartInstance) stockChartInstance.destroy();
        stockChartInstance = new Chart(ctxProfit, {
            type: 'bar',
            plugins: [ChartDataLabels],
            data: {
                labels: todayData.stocks.map(s => s.name),
                datasets: [{
                    data: todayData.stocks.map(s => s.profit_rate),
                    backgroundColor: todayData.stocks.map(s => s.profit_rate >= 0 ? '#ff5e67' : '#4da6ff'),
                    borderRadius: 4
                }]
            },
            options: {
                maintainAspectRatio: false,
                layout: { padding: { top: 24 } },
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        display: true, align: 'end', anchor: 'end', color: '#f0f0f3', font: { size: 10, weight: '600' },
                        formatter: function(value) { return (value > 0 ? '+' : '') + value.toFixed(1) + '%'; }
                    }
                }
            }
        });
    }

    function initDraggable() {
        const el = document.getElementById("draggable-diary");
        const header = document.getElementById("draggable-diary-header");
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

        header.onmousedown = dragMouseDown;
        header.ontouchstart = dragMouseDown;

        function dragMouseDown(e) {
            e = e || window.event;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pos3 = clientX; pos4 = clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
            document.ontouchend = closeDragElement;
            document.ontouchmove = elementDrag;
        }

        function elementDrag(e) {
            e = e || window.event;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pos1 = pos3 - clientX; pos2 = pos4 - clientY;
            pos3 = clientX; pos4 = clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
            el.style.bottom = "auto"; el.style.right = "auto";
        }

        function closeDragElement() {
            document.onmouseup = null; document.onmousemove = null;
            document.ontouchend = null; document.ontouchmove = null;
        }
    }
</script>
</body>
</html>
