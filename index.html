<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Portfolio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-neutral: #141417;
            --bg-card: #1e1e22;
            --text-main: #f0f0f3;
            --text-sub: #9ea4ae;
            --border-subtle: #2d2d33;
            
            --color-up: #ff5e67;
            --color-down: #4da6ff;
            --color-accent: #6c5ce7;
        }

        body {
            background-color: var(--bg-neutral);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
        }

        h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main); }
        .header-sub { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        h3 { font-size: 15px; font-weight: 600; color: var(--text-main); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        .val-up { color: var(--color-up); }
        .val-down { color: var(--color-down); }

        .asset-overview {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-balance { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .sub-balance-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }
        .balance-item { display: flex; flex-direction: column; gap: 2px; }
        .balance-label { font-size: 12px; color: var(--text-sub); }
        .balance-value { font-size: 15px; font-weight: 600; }

        /* 대형 입력창 전용 스타일 (복붙함 및 시장 관점용) */
        textarea {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-main);
            padding: 12px;
            box-sizing: border-box;
            resize: none;
            font-size: 13px;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: var(--color-accent); }

        .btn-apply {
            width: 100%;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-apply:hover { opacity: 0.9; }

        .chart-container {
            position: relative;
            height: 190px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            color: var(--text-sub);
            font-weight: 500;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: middle;
        }

        .stock-name-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stock-ticker { font-weight: 700; color: var(--text-main); }
        .stock-quantity { font-size: 11px; color: var(--text-sub); }

        .price-cell { text-align: right; }
        .profit-cell { text-align: right; font-weight: 600; }

        .opinion-input {
            width: 100%;
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 13px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .opinion-input:focus { outline: none; border-color: var(--color-accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>나의 자산 및 주식 관점 일지</h1>
        <div class="header-sub">Gem에서 복사한 텍스트를 붙여넣어 화면을 즉시 업데이트하세요.</div>
    </header>

    <div class="card" style="border-color: var(--color-accent);">
        <h3>📥 <span>Gem 추출 데이터 복붙함</span></h3>
        <textarea id="json-paste-box" style="height: 100px; font-family: monospace;" placeholder="Gem이 텍스트로 뽑아준 JSON 데이터를 여기에 붙여넣으세요."></textarea>
        <button class="btn-apply" onclick="applyGemData()">데이터 즉시 적용 및 변환하기</button>
    </div>

    <div class="card">
        <h3>📈 <span style="margin-left: 2px;">현재 자산 현황 Overview</span></h3>
        <div class="asset-overview">
            <div class="main-balance" id="txt-total-asset">0원</div>
            <div class="sub-balance-group">
                <div class="balance-item">
                    <span class="balance-label">원금</span>
                    <span class="balance-value" id="txt-principal">0원</span>
                </div>
                <div class="balance-item">
                    <span class="balance-label">총 수익 (수익률)</span>
                    <span class="balance-value" id="txt-total-profit-rate">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📝 <span>오늘의 시장 관점 일지</span></h3>
        <textarea id="market-view" style="height: 90px;" placeholder="오늘 시황에 대한 개인적인 생각이나 메모를 기록하세요..."></textarea>
    </div>

    <div class="card">
        <h3>📊 <span>총자산 추이 비교</span></h3>
        <div class="chart-container">
            <canvas id="assetHistoryChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>⚖️ <span>종목별 수익률 비교</span></h3>
        <div class="chart-container">
            <canvas id="stockProfitChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 40px; padding: 16px;">
        <h3 style="margin-bottom: 16px; justify-content: space-between;">
            <span>🔍 종목별 현황 및 매매 의견</span>
            <span style="font-size:11px; color:var(--text-sub);">날짜별 자동 저장</span>
        </h3>
        <table id="stock-table">
            <thead>
                <tr>
                    <th style="width: 28%;">종목명</th>
                    <th style="width: 25%; text-align: right;">현재가</th>
                    <th style="width: 22%; text-align: right;">수익률</th>
                    <th style="width: 25%;">매매 의견</th>
                </tr>
            </thead>
            <tbody id="stock-list">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 브라우저 내부 로컬 데이터베이스 연동
    let db = JSON.parse(localStorage.getItem('portfolio_db')) || [];
    
    let assetChartInstance = null;
    let stockChartInstance = null;

    Chart.defaults.font.family = "'Pretendard', sans-serif";
    Chart.defaults.color = "#9ea4ae";
    Chart.defaults.plugins.tooltip.backgroundColor = "rgba(30, 30, 34, 0.9)";
    Chart.defaults.plugins.tooltip.titleColor = "#f0f0f3";
    Chart.defaults.plugins.tooltip.bodyColor = "#f0f0f3";

    window.onload = function() {
        if(db.length === 0) {
            // 최초 접속 시 보여줄 기본 초기 데이터 설정
            db = [{
                "date": "2026-05-18",
                "total_asset": 23679417,
                "principal": 15429928,
                "total_profit": 8249489,
                "total_profit_rate": 53.4,
                "stocks": [
                    { "name": "시에나", "count": 10, "current_price": 854886, "profit_rate": 130.3 },
                    { "name": "INTW", "count": 15, "current_price": 413944, "profit_rate": 481.3 },
                    { "name": "METU", "count": 87, "current_price": 36925, "profit_rate": -26.4 },
                    { "name": "NVDL", "count": 10, "current_price": 179556, "profit_rate": 20.7 },
                    { "name": "PLTU", "count": 30, "current_price": 52193, "profit_rate": -44.6 },
                    { "name": "AMDL", "count": 20, "current_price": 72890, "profit_rate": 112.0 },
                    { "name": "TSLL", "count": 40, "current_price": 22197, "profit_rate": -30.6 },
                    { "name": "애플", "count": 0.004171, "current_price": 447165, "profit_rate": 39.6 }
                ]
            }];
            localStorage.setItem('portfolio_db', JSON.stringify(db));
        }
        updateDashboard();
    };

    // 붙여넣은 텍스트 파싱 및 처리 함수
    function applyGemData() {
        const rawText = document.getElementById('json-paste-box').value.trim();
        if(!rawText) {
            alert("Gem에게 받은 데이터를 붙여넣어 주세요.");
            return;
        }

        try {
            const newData = JSON.parse(rawText);
            
            if(!newData.date || !newData.total_asset) {
                alert("정확한 주식 데이터 형식이 아닙니다.");
                return;
            }

            const existingIndex = db.findIndex(item => item.date === newData.date);
            if (existingIndex !== -1) {
                db[existingIndex] = newData;
            } else {
                db.push(newData);
            }

            db.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('portfolio_db', JSON.stringify(db));
            
            document.getElementById('json-paste-box').value = "";
            updateDashboard();
            alert(`${newData.date} 자산 기록이 대시보드에 업데이트되었습니다.`);

        } catch(e) {
            alert("JSON 해석 오류입니다. 코드 내용만 똑바로 복사되었는지 확인해주세요.");
        }
    }

    // 종합 UI 업데이트 및 동적 그리기
    function updateDashboard() {
        const todayData = db[db.length - 1];

        // 1. 자산 상단 패널 갱신
        document.getElementById('txt-total-asset').innerText = todayData.total_asset.toLocaleString() + "원";
        document.getElementById('txt-principal').innerText = todayData.principal.toLocaleString() + "원";
        
        const profitRateEl = document.getElementById('txt-total-profit-rate');
        const sign = todayData.total_profit_rate >= 0 ? "+" : "";
        profitRateEl.innerText = `${sign}${todayData.total_profit_rate}%`;
        profitRateEl.className = `balance-value ${todayData.total_profit_rate >= 0 ? 'val-up' : 'val-down'}`;

        // 2. 시장 관점 연동 및 자동저장 기능 추가
        const viewArea = document.getElementById('market-view');
        const viewKey = `market_view_${todayData.date}`;
        viewArea.value = localStorage.getItem(viewKey) || "";
        viewArea.oninput = function(e) {
            localStorage.setItem(viewKey, e.target.value);
        };

        // 3. 종목 현황 테이블 리스트 갱신
        const stockListContainer = document.getElementById('stock-list');
        stockListContainer.innerHTML = "";
        
        todayData.stocks.forEach((stock, idx) => {
            const tr = document.createElement('tr');
            const rateClass = stock.profit_rate >= 0 ? 'val-up' : 'val-down';
            const formattedRate = (stock.profit_rate > 0 ? "+" : "") + stock.profit_rate.toFixed(1) + "%";
            const formattedCount = Number.isInteger(stock.count) ? `${stock.count}주` : `${stock.count.toFixed(6)}주`;

            const opinionStorageKey = `opinion_${stock.name}_${todayData.date}`;
            const savedOpinion = localStorage.getItem(opinionStorageKey) || "";

            tr.innerHTML = `
                <td>
                    <div class="stock-name-cell">
                        <span class="stock-ticker">${stock.name}</span>
                        <span class="stock-quantity">${formattedCount}</span>
                    </div>
                </td>
                <td class="price-cell">${stock.current_price.toLocaleString()}원</td>
                <td class="profit-cell ${rateClass}">${formattedRate}</td>
                <td>
                    <input type="text" class="opinion-input" id="input-${idx}" 
                           placeholder="계획 입력" value="${savedOpinion}"
                           onchange="localStorage.setItem('${opinionStorageKey}', this.value)">
                </td>
            `;
            stockListContainer.appendChild(tr);
        });

        // 4. CHART 1: 총자산 추이 그래프 (Line)
        const ctxHistory = document.getElementById('assetHistoryChart').getContext('2d');
        if(assetChartInstance) assetChartInstance.destroy();
        assetChartInstance = new Chart(ctxHistory, {
            type: 'line',
            data: {
                labels: db.map(d => d.date.split('-').slice(1).join('.')),
                datasets: [{
                    data: db.map(d => d.total_asset),
                    borderColor: '#6c5ce7',
                    backgroundColor: 'rgba(108, 92, 231, 0.08)',
                    borderWidth: 2.5,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#6c5ce7',
                    pointBorderColor: '#1e1e22',
                    pointBorderWidth: 1.5,
                    pointRadius: 3
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { datalabels: { display: false }, legend: { display: false } },
                scales: {
                    x: { grid: { color: '#2a2a2e' }, ticks: { font: { size: 10 } } },
                    y: { grid: { color: '#2a2a2e' }, ticks: { display: false } }
                }
            }
        });

        // 5. CHART 2: 종목별 수익률 상시 수치 표시 그래프 (Bar)
        const ctxProfit = document.getElementById('stockProfitChart').getContext('2d');
        const colorUp = getComputedStyle(document.documentElement).getPropertyValue('--color-up').trim();
        const colorDown = getComputedStyle(document.documentElement).getPropertyValue('--color-down').trim();

        if(stockChartInstance) stockChartInstance.destroy();
        stockChartInstance = new Chart(ctxProfit, {
            type: 'bar',
            plugins: [ChartDataLabels],
            data: {
                labels: todayData.stocks.map(s => s.name),
                datasets: [{
                    data: todayData.stocks.map(s => s.profit_rate),
                    backgroundColor: todayData.stocks.map(s => s.profit_rate >= 0 ? colorUp : colorDown),
                    borderRadius: 4,
                    barPercentage: 0.6
                }]
            },
            options: {
                maintainAspectRatio: false,
                layout: { padding: { top: 24 } },
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        display: true,
                        align: 'end',
                        anchor: 'end',
                        color: '#f0f0f3',
                        font: { size: 10, weight: '600' },
                        formatter: function(value) {
                            return (value > 0 ? '+' : '') + value.toFixed(1) + '%';
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                    y: { grid: { color: '#2a2a2e' }, ticks: { font: { size: 10 } }, grace: '10%' }
                }
            }
        });
    }
</script>
</body>
</html>
