<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Portfolio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        /* [DESIGN] Modern Dark Theme with Accent Colors */
        :root {
            --bg-neutral: #141417;   /* Deep Dark for BG */
            --bg-card: #1e1e22;      /* Elevated Grey for Cards */
            --text-main: #f0f0f3;    /* Near White for Primary Text */
            --text-sub: #9ea4ae;     /* Cool Grey for Labels */
            --border-subtle: #2d2d33; /* Darker grey for borders */
            --chart-grid: #2a2a2e;
            
            --color-up: #ff5e67;     /* Warm Coral for Profit */
            --color-down: #4da6ff;   /* Soft Blue for Loss */
            --color-accent: #6c5ce7;  /* Purple for Interactive elements */
        }

        body {
            background-color: var(--bg-neutral);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 600px; /* Mobile-first container */
            margin: 0 auto;
        }

        /* [DESIGN] Clean Header */
        header {
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
        }

        h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main); }
        .header-sub { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        /* [DESIGN] Card Component - Modern elevated look */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        h3 { font-size: 15px; font-weight: 600; color: var(--text-main); margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        /* [DESIGN] Profit/Loss Text Colorization */
        .val-up { color: var(--color-up); }
        .val-down { color: var(--color-down); }

        /* [DESIGN] Optimized Asset Overview Section */
        .asset-overview {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-balance { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .sub-balance-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }
        .balance-item { display: flex; flex-direction: column; gap: 2px; }
        .balance-label { font-size: 12px; color: var(--text-sub); }
        .balance-value { font-size: 15px; font-weight: 600; }

        /* [DESIGN] Polished Charts */
        .chart-container {
            position: relative;
            height: 180px;
        }

        /* [DESIGN] Streamlined Table with better KOR spacing */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            color: var(--text-sub);
            font-weight: 500;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: middle;
        }

        .stock-name-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stock-ticker { font-weight: 700; color: var(--text-main); }
        .stock-quantity { font-size: 11px; color: var(--text-sub); }

        .price-cell { text-align: right; }
        .profit-cell { text-align: right; font-weight: 600; }

        /* [DESIGN] Modern, less obtrusive input */
        .opinion-input {
            width: 100%;
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 13px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .opinion-input:focus { outline: none; border-color: var(--color-accent); }
        .opinion-input::placeholder { color: #555; font-style: italic; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>나의 자산 및 주식 관점 일지</h1>
        <div class="header-sub">매일의 포트폴리오 상태와 매매 전략을 세련되게 기록합니다.</div>
    </header>

    <div class="card">
        <h3>📈 <span style="margin-left: 2px;">현재 자산 현황 Overview</span></h3>
        <div class="asset-overview">
            <div class="main-balance" id="txt-total-asset">0원</div>
            <div class="sub-balance-group">
                <div class="balance-item">
                    <span class="balance-label">원금</span>
                    <span class="balance-value" id="txt-principal">0원</span>
                </div>
                <div class="balance-item">
                    <span class="balance-label">총 수익 (수익률)</span>
                    <span class="balance-value" id="txt-total-profit-rate">0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>📊 <span>총자산 추이 비교</span></h3>
        <div class="chart-container">
            <canvas id="assetHistoryChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>⚖️ <span>종목별 수익률 비교</span></h3>
        <div class="chart-container">
            <canvas id="stockProfitChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 40px; padding: 16px;">
        <h3 style="margin-bottom: 16px; justify-content: space-between;">
            <span>🔍 종목별 현황 및 매매 의견</span>
            <span style="font-size:11px; color:var(--text-sub);">날짜별 자동 저장</span>
        </h3>
        <table id="stock-table">
            <thead>
                <tr>
                    <th style="width: 28%;">종목명</th>
                    <th style="width: 25%; text-align: right;">현재가</th>
                    <th style="width: 22%; text-align: right;">수익률</th>
                    <th style="width: 25%;">매매 의견</th>
                </tr>
            </thead>
            <tbody id="stock-list">
                </tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // [DESIGN] Optimized Sample Data from Screenshot
    // ==========================================
    const portfolioHistory = [
        {
            "date": "2026-05-17",
            "total_asset": 22500000,
            "principal": 15429928,
            "total_profit": 7070072,
            "total_profit_rate": 45.8,
            "stocks": []
        },
        {
            "date": "2026-05-18", // Data derived from your screenshot
            "total_asset": 23499458,
            "principal": 15429928,
            "total_profit": 8069530,
            "total_profit_rate": 52.2,
            "stocks": [
                { "name": "시에나", "count": 10, "avg_price": 371048, "current_price": 835973, "profit_rate": 125.3 },
                { "name": "INTW", "count": 15, "avg_price": 71206, "current_price": 413794, "profit_rate": 481.1 },
                { "name": "METU", "count": 87, "avg_price": 50174, "current_price": 36970, "profit_rate": -26.3 },
                { "name": "NVDL", "count": 10, "avg_price": 148686, "current_price": 180290, "profit_rate": 21.2 },
                { "name": "PLTU", "count": 30, "avg_price": 94344, "current_price": 51998, "profit_rate": -44.8 },
                { "name": "AMDL", "count": 20, "avg_price": 34366, "current_price": 73100, "profit_rate": 112.7 },
                { "name": "TSLL", "count": 40, "avg_price": 32007, "current_price": 22242, "profit_rate": -30.5 },
                { "name": "애플", "count": 0.004171, "avg_price": 320306, "current_price": 447630, "profit_rate": 39.7 }
            ]
        }
    ];

    // Chart.js Global Modern Config
    Chart.defaults.font.family = "'Pretendard', sans-serif";
    Chart.defaults.color = "#9ea4ae"; // var(--text-sub)
    Chart.defaults.plugins.tooltip.backgroundColor = "rgba(30, 30, 34, 0.9)"; // var(--bg-card)
    Chart.defaults.plugins.tooltip.titleColor = "#f0f0f3"; // var(--text-main)
    Chart.defaults.plugins.tooltip.bodyColor = "#f0f0f3";

    const todayData = portfolioHistory[portfolioHistory.length - 1];

    // 1. [DESIGN] Update Overview with styled Profit/Loss rate
    document.getElementById('txt-total-asset').innerText = todayData.total_asset.toLocaleString() + "원";
    document.getElementById('txt-principal').innerText = todayData.principal.toLocaleString() + "원";
    
    const profitRateEl = document.getElementById('txt-total-profit-rate');
    const sign = todayData.total_profit_rate >= 0 ? "+" : "";
    profitRateEl.innerText = `${sign}${todayData.total_profit_rate}%`;
    profitRateEl.className = `balance-value ${todayData.total_profit_rate >= 0 ? 'val-up' : 'val-down'}`;


    // 3. [DESIGN] Streamlined Stock Table with Opinions
    const stockListContainer = document.getElementById('stock-list');
    todayData.stocks.forEach((stock, idx) => {
        const tr = document.createElement('tr');
        
        // Color coding profit rate
        const rateClass = stock.profit_rate >= 0 ? 'val-up' : 'val-down';
        const formattedRate = (stock.profit_rate > 0 ? "+" : "") + stock.profit_rate.toFixed(1) + "%";
        
        // Handling fractional shares
        const formattedCount = Number.isInteger(stock.count) ? `${stock.count}주` : `${stock.count.toFixed(6)}주`;

        // Local Storage for storing user opinions per stock per date
        const opinionStorageKey = `opinion_${stock.name}_${todayData.date}`;
        const savedOpinion = localStorage.getItem(opinionStorageKey) || "";

        tr.innerHTML = `
            <td>
                <div class="stock-name-cell">
                    <span class="stock-ticker">${stock.name}</span>
                    <span class="stock-quantity">${formattedCount}</span>
                </div>
            </td>
            <td class="price-cell">${stock.current_price.toLocaleString()}원</td>
            <td class="profit-cell ${rateClass}">${formattedRate}</td>
            <td>
                <input type="text" class="opinion-input" id="input-${idx}" 
                       placeholder="예: 조정시 매수" value="${savedOpinion}"
                       onchange="saveStockOpinion('${stock.name}', '${todayData.date}', this.value)">
            </td>
        `;
        stockListContainer.appendChild(tr);
    });

    // Opinion Auto-Save Function
    function saveStockOpinion(stockName, date, opinionText) {
        localStorage.setItem(`opinion_${stockName}_${date}`, opinionText);
    }

    // ==========================================
    // [DESIGN] CHART 1: Elegant Asset Line Chart
    // ==========================================
    const ctxHistory = document.getElementById('assetHistoryChart').getContext('2d');
    new Chart(ctxHistory, {
        type: 'line',
        data: {
            labels: portfolioHistory.map(d => d.date.split('-').slice(1).join('.')), // M.DD
            datasets: [{
                data: portfolioHistory.map(d => d.total_asset),
                borderColor: '#6c5ce7', // var(--color-accent) Purple
                backgroundColor: 'rgba(108, 92, 231, 0.08)',
                borderWidth: 2.5,
                tension: 0.3, // Rounded smooth curve
                fill: true,
                pointBackgroundColor: '#6c5ce7',
                pointBorderColor: '#1e1e22',
                pointBorderWidth: 1.5,
                pointRadius: 3,
                pointHoverRadius: 5
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: '#2a2a2e' }, ticks: { color: '#9ea4ae', font: { size: 10 } } },
                y: { grid: { color: '#2a2a2e' }, ticks: { display: false } } // Simplified Y axis
            }
        }
    });

    // ==========================================
    // [DESIGN] CHART 2: Modern Bar Chart for Profit Comparison
    // ==========================================
    const ctxProfit = document.getElementById('stockProfitChart').getContext('2d');
    const colorUp = getComputedStyle(document.documentElement).getPropertyValue('--color-up').trim();
    const colorDown = getComputedStyle(document.documentElement).getPropertyValue('--color-down').trim();

    new Chart(ctxProfit, {
        type: 'bar',
        data: {
            labels: todayData.stocks.map(s => s.name),
            datasets: [{
                data: todayData.stocks.map(s => s.profit_rate),
                backgroundColor: todayData.stocks.map(s => s.profit_rate >= 0 ? colorUp : colorDown),
                borderRadius: 4, // Rounded bars
                barPercentage: 0.6
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#9ea4ae', font: { size: 10 } } },
                y: { grid: { color: '#2a2a2e' }, ticks: { color: '#9ea4ae', font: { size: 10 } } }
            }
        }
    });
</script>
</body>
</html>
